# ---------------------------------------------------------------------------
# Bilingual content for the Sense of Tech one-page site.
# Every string has a `fr` and `en` variant. The template renders both and a
# small language switcher (assets/js/site.js) toggles which one is visible.
# ---------------------------------------------------------------------------

brand:
  name: Sense of Tech
  tagline:
    fr: "L'ingénierie logicielle, augmentée par l'IA"
    en: "Software engineering, augmented by AI"

