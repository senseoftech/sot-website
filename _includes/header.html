{%- assign c = site.data.content -%}
<header class="site-header">
  <div class="container">
    <nav class="nav" aria-label="Main">
      <a class="nav__logo" href="{{ '/' | relative_url }}#top" aria-label="{{ c.brand.name }}">
        <img src="{{ '/assets/images/logo-3.png' | relative_url }}" alt="{{ c.brand.name }}">
      </a>

      <ul class="nav__links">
        {%- for item in c.nav -%}
        <li>
          <a href="#{{ item.id }}">
            <span class="i18n-fr">{{ item.fr }}</span><span class="i18n-en">{{ item.en }}</span>
          </a>
        </li>
        {%- endfor -%}
      </ul>

      <div class="nav__right">
        <div class="lang-switch" role="group" aria-label="Language">
          <button type="button" data-set-lang="fr" aria-pressed="false">FR</button>
          <button type="button" data-set-lang="en" aria-pressed="false">EN</button>
        </div>

        <a class="btn btn-primary nav__cta" href="#contact">
          <span class="i18n-fr">{{ c.hero.cta_primary.fr }}</span><span class="i18n-en">{{ c.hero.cta_primary.en }}</span>
        </a>

        <button class="nav__toggle" type="button" aria-label="Menu" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </div>
    </nav>
  </div>
</header>
