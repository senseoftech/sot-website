{%- comment -%}
  Global JSON-LD graph: Organization / ProfessionalService, founder Person,
  WebSite, and the service catalog. Rendered on every page from head.html.
  Uses `jsonify` for safe JSON string encoding.
{%- endcomment -%}
{%- assign co = site.company -%}
{%- assign c = site.data.content -%}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": ["Organization", "ProfessionalService"],
      "@id": {{ site.url | append: '/#organization' | jsonify }},
      "name": {{ co.legal_name | jsonify }},
      "url": {{ site.url | append: '/' | jsonify }},
      "logo": {{ '/assets/images/logo-3.png' | absolute_url | jsonify }},
      "image": {{ '/assets/images/logo-3.png' | absolute_url | jsonify }},
      "description": {{ "Sense of Tech accompagne les entreprises dans l'ingénierie assistée par IA, la création et la modernisation d'applications, ainsi que les formations et conférences." | jsonify }},
      "email": {{ co.email | jsonify }},
      "telephone": {{ co.phone | jsonify }},
      "vatID": {{ co.vat | jsonify }},
      "foundingDate": "2020",
      "founder": { "@id": {{ site.url | append: '/#founder' | jsonify }} },
      "address": {
        "@type": "PostalAddress",
        "streetAddress": {{ co.street | jsonify }},
        "postalCode": {{ co.postal_code | jsonify }},
        "addressLocality": {{ co.city | jsonify }},
        "addressCountry": {{ co.country_code | jsonify }}
      },
      "areaServed": ["BE", "FR", "LU", "EU"],
      "availableLanguage": ["fr", "en"],
      "knowsAbout": [
        "Artificial Intelligence", "AI-assisted engineering", "Software modernization",
        "Cloud", "DevOps", "Custom software development", "Microsoft technologies",
        "Technical training", "Conferences"
      ],
      "sameAs": [
        {%- assign links = "" -%}
        {%- for s in c.socials -%}{%- assign links = links | append: s.link | append: '|' -%}{%- endfor -%}
        {%- assign arr = links | split: '|' -%}
        {%- for l in arr -%}{{ l | jsonify }}{%- unless forloop.last -%}, {%- endunless -%}{%- endfor -%}
      ],
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Expertises",
        "itemListElement": [
          {%- for s in c.expertise.services -%}
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": {{ s.title.fr | jsonify }},
              "description": {{ s.desc.fr | jsonify }}
            }
          }{%- unless forloop.last -%},{%- endunless -%}
          {%- endfor -%}
        ]
      }
    },
    {
      "@type": "Person",
      "@id": {{ site.url | append: '/#founder' | jsonify }},
      "name": {{ co.founder | jsonify }},
      "jobTitle": "Founder",
      "description": {{ "Fondateur de Sense of Tech et Microsoft MVP." | jsonify }},
      "award": "Microsoft MVP",
      "worksFor": { "@id": {{ site.url | append: '/#organization' | jsonify }} },
      "sameAs": [
        "https://www.linkedin.com/in/aclerbois/",
        "https://twitter.com/aclerbois"
      ]
    },
    {
      "@type": "WebSite",
      "@id": {{ site.url | append: '/#website' | jsonify }},
      "url": {{ site.url | append: '/' | jsonify }},
      "name": {{ co.legal_name | jsonify }},
      "publisher": { "@id": {{ site.url | append: '/#organization' | jsonify }} },
      "inLanguage": ["fr", "en"]
    }
  ]
}
</script>
